# ?? Fiscalization ???????????????????????????????????????
fiscalization.base-url=${FISCALIZATION_BASE_URL:http://localhost:8087}
spring.sql.init.mode=never
app.seed.enabled=true
zimra.fiscalization.enabled=true
zimra.fiscalization.credit-note.enabled=false

# Receipt defaults: submit-receipt endpoint
#Since ZimParks sells services, 99001000 is likely the correct default for standard-rated products
zimra.receipt.hs-code=99001000
# Default HS code used for custom / free-form items that have no product catalog entry.
# Override with ZIMRA_RECEIPT_MISC_HS_CODE environment variable if needed.
zimra.receipt.misc-hs-code=${ZIMRA_RECEIPT_MISC_HS_CODE:99001000}
zimra.receipt.tax-code=A
zimra.receipt.tax-id=517
zimra.receipt.print-form=Receipt48
zimra.receipt.line-type=Sale
zimra.receipt.type=FiscalInvoice
zimra.receipt.default-payment-type=Cash

#HS Codes
#99001000 - Services at 15.5% VAT
#99002000 - Services at 0% VAT
#99003000 - Services ? VAT Exempt

# ?? Activity Logging ???????????????????????????????????????
